<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>UCL Intro — JS/Canvas port</title>
<style>
  html, body { margin: 0; background: #000; color: #ddd; font-family: monospace; height: 100%; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    width: 960px;       /* 320 * 3 */
    height: 600px;      /* 200 * 3 */
    background: #000;
    box-shadow: 0 0 60px #2a2a2a;
  }
  .bar { display: flex; gap: 1rem; align-items: center; font-size: 12px; opacity: 0.7; }
  button { background: #222; color: #ddd; border: 1px solid #444; padding: 6px 14px; cursor: pointer; font-family: monospace; }
  button:hover { background: #333; }
</style>
</head>
<body>
  <canvas id="screen" width="320" height="200"></canvas>
  <div class="bar">
    <span>-UCL- Intr0 by SkullC0DEr (1996) — JS/Canvas port</span>
    <button id="sound">Sound on</button>
    <button id="reset">Reset</button>
    <span id="fps"></span>
  </div>
  <script type="module" src="demo.js"></script>
</body>
</html>

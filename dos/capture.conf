[sdl]
output = surface

[dosbox]
machine = svga_s3
captures = capture

[mixer]
nosound = false
rate = 48000
blocksize = 2048

[sblaster]
sbtype = sb16
oplmode = opl2
oplrate = 49716

[speaker]
pcspeaker = false
tandy = off
disney = false

[autoexec]
@echo off
echo ==========================================================
echo  Click the DOSBox-X menu:  Capture - Wave Output - Start
echo  (Demo will auto-exit after 35 s; WAV in capture/ dir)
echo ==========================================================
mount c .
c:
UCL.COM
